name: mnist_resnet
pipeline:
  stages:
    Encoder:
    - type_key: ResNetEncoder
      keys_in:
      - features
      keys_out:
      - embeddings
      params: {}
      meta_in:
      meta_out:
    Pooling:
    - type_key: GlobalAveragePooling
      keys_in:
      - embeddings
      keys_out:
      - pooled_embeddings
      params: {}
      meta_in:
      meta_out:
    Head:
    - type_key: LatentClassificationHead
      keys_in:
      - pooled_embeddings
      keys_out:
      - class_logits
      params:
        num_classes: 10
        softmax: true
      meta_in:
      meta_out:
    Loss:
    - type_key: BCELoss
      keys_in:
      - class_logits
      keys_out:
      - classification_loss
      params:
        label_key: class_labels
      meta_in:
      meta_out:
training:
  optimizer:
    type: torch.optim.Adam
    params:
      lr: 0.001
  scheduler:
    type: torch.optim.lr_scheduler.ConstantLR
    params:
      factor: 1.0
      total_iters: 0
    warmup:
  loss_keys:
    classification_loss: 1.0
  metric_keys: []
  progress_bar_keys:
  - loss
  max_epochs: 10
  batch_size: 64
  lr: 0.001
  accelerator: auto
  devices: auto
  strategy: auto
  precision: 32-true
data:
  source_type: mnist
  params: {}
  targets: []
  train_split: 0.7
  val_split: 0.15
  test_split: 0.15
  datasets:
  - type_key: MNISTDataset
    params:
      root: data
      train: true
      download: true
    modality: image
    max_samples:
    split_type: fit
  - type_key: MNISTDataset
    params:
      root: data
      train: false
      download: true
    modality: image
    max_samples:
    split_type: test
  loader:
    backend: dali
    batch_size:
    num_workers: 4
    prefetch_factor:
    persistent_workers: false
    weighted_sampling: false
    shuffle_train: true
  input_shapes:
    features:
    - 1
    - 28
    - 28
  num_classes: 10
  merge_labels:
  feature_key: features
  skip_pipeline_stages: []
  preprocessing:
    enabled: false
    source_view: raw
    target_view: prepared
    path:
    until_x_keys: []
    until_y_keys: []
    x_keys:
    y_keys:
    include_labels: true
    label_prefix: label__
    writer: numpy
    overwrite: false
evaluation:
  metrics: []
  algorithms: []
  test_result_metrics: all
logging:
  tensorboard:
    log_dir: logs/tensorboard
  dvclive:
  mlflow:
    tracking_uri: sqlite:///./logs/mlflow/mlflow.db
    artifact_location:
    experiment_name: mnist_resnet
    log_model: false
    run_id:
    parent_run_id:
    auto_nested_runs: true
    tags: {}
    synchronous:
  diagram:
    enabled: true
    depth: 2
    direction: TB
    show_params: true
    show_shapes: true
    show_metrics: true
    output_dir: .experiments/diagrams
  temp_artifact_dir: /tmp/mlruns
  experiment_name: mnist_resnet
  run_name:
  log_system_metrics: false
callbacks: []
tuning:
checkpoint:
exports: []
